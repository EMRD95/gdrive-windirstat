name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject client ID into config.js
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          set -e
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "::error::Repository secret GOOGLE_CLIENT_ID is not set."
            echo "::error::Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          cat > config.js <<EOF
          // Generated by CI at deploy time. Do not commit.
          export const CLIENT_ID = '${GOOGLE_CLIENT_ID}';
          EOF
          echo "config.js written ($(wc -c < config.js) bytes)"

      - name: Stage deploy artifact
        run: |
          set -e
          mkdir -p _site
          # Copy everything except git / CI / docs-internal / local-only files
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='LICENSE' \
            --exclude='config.example.js' \
            --exclude='GOOGLE_VERIFICATION.md' \
            ./ _site/
          # Keep the README assets folder accessible (for OG image etc.)
          if [ -d docs ]; then
            cp -r docs _site/docs
          fi
          echo "Deploy tree:"
          find _site -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
